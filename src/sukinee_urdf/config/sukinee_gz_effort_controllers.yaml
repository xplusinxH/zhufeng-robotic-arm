controller_manager:
  ros__parameters:
    update_rate: 60

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_effort_controller:
      type: effort_controllers/JointGroupEffortController
    arm4_effort_controller:
      type: effort_controllers/JointGroupEffortController
    arm3_effort_controller:
      type: effort_controllers/JointGroupEffortController
    joint4_effort_controller:
      type: effort_controllers/JointGroupEffortController
    joint7_position_controller:
      type: position_controllers/JointGroupPositionController
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 60.0


arm_effort_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6

arm4_effort_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
arm3_effort_controller:
  ros__parameters:
    joints:
      - Joint1
      - Joint2
      - Joint3
joint4_effort_controller:
  ros__parameters:
    joints:
      - Joint4
joint7_position_controller:
  ros__parameters:
    joints:
      - Joint7
    interface_name: position
